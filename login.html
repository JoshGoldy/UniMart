<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — UniMart</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    .auth-step { display: none; }
    .auth-step.active { display: block; }
  </style>
</head>
<body class="auth-page">

  <div class="auth-card">

    <!-- Logo -->
    <div class="auth-logo">
  <img src="unimart-logo.png" alt="UniMart Logo" class="logo-img" />
</div>

    <!-- ===== STEP 1 — Credentials ===== -->
    <div id="step-login" class="auth-step active">
      <div class="auth-header">
        <h1>Welcome back</h1>
        <p>Sign in to your UniMart account</p>
      </div>

      <form class="auth-form" id="login-form" novalidate>

        <div class="form-group">
          <label class="form-label" for="login-email">Email address</label>
          <input class="form-input" id="login-email" type="email" placeholder="you@university.edu" autocomplete="email" required />
          <span class="form-error" id="email-error"></span>
        </div>

        <div class="form-group">
          <label class="form-label" for="login-password">Password</label>
          <div class="input-wrapper">
            <input class="form-input" id="login-password" type="password" placeholder="Enter your password" autocomplete="current-password" required />
            <button type="button" class="input-toggle" id="pw-toggle" aria-label="Toggle password visibility">👁</button>
          </div>
          <span class="form-error" id="password-error"></span>
        </div>

        <div style="display:flex; justify-content:flex-end; margin-top:-8px;">
          <a href="#" style="font-size:.83rem; color:var(--sage); font-weight:600;">Forgot password?</a>
        </div>

        <div class="form-error" id="login-error" style="text-align:center; font-size:.85rem;"></div>

        <button type="submit" class="btn btn-primary btn-full btn-lg" id="login-btn">
          Sign in
        </button>
      </form>

      <div class="auth-footer">
        Don't have an account? <a href="signup.html">Create one</a>
      </div>
    </div>

  </div><!-- /auth-card -->

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="auth.js"></script>
  <script>
    // Redirect if already logged in
    Auth.getUser().then(user => { if (user) window.location.href = 'search.html'; });

    /* ---- Password toggle ---- */
    document.getElementById('pw-toggle').addEventListener('click', function () {
      const inp = document.getElementById('login-password');
      inp.type  = inp.type === 'password' ? 'text' : 'password';
      this.textContent = inp.type === 'password' ? '👁' : '🙈';
    });

    /* ---- Login form ---- */
    document.getElementById('login-form').addEventListener('submit', async function (e) {
      e.preventDefault();
      clearErrors();
      const email    = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      let valid = true;

      if (!email) { showError('email-error', 'Email is required.'); valid = false; }
      else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showError('email-error', 'Enter a valid email.'); valid = false; }
      if (!password) { showError('password-error', 'Password is required.'); valid = false; }
      if (!valid) return;

      const btn = document.getElementById('login-btn');
      btn.textContent = 'Signing in…';
      btn.disabled = true;

      const result = await Auth.signIn({ email, password });

      btn.textContent = 'Sign in';
      btn.disabled = false;

      if (result.error) { showError('login-error', result.error); return; }

      window.location.href = 'search.html';
    });

    /* ---- Helpers ---- */
    function clearErrors() {
      document.querySelectorAll('.form-error').forEach(el => {
        el.textContent = '';
        el.classList.remove('visible');
      });
    }
    function showError(id, msg) {
      const el = document.getElementById(id);
      if (el) { el.textContent = msg; el.classList.add('visible'); }
    }
  </script>
</body>
</html>
